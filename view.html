<html>
<head>
    <title>View Students</title>

    <style>
      body {
        margin:0;
        font-family:Arial, Helvetica, sans-serif;
        text-align:center;
        background:#f5f7fb;
      }

      nav {
        background:#0ea5e9;
        padding:12px 16px;
      }

      nav a{
          text-decoration:none;
          padding:0 10px;
          color:white;
      }

      nav a:hover{
          color:black;
      }

      h1{
          margin:20px;
      }

      table{
          width:80%;
          margin:20px auto;
          background:white;
          border-collapse:collapse;
      }

      th{
          background:#0ea5e9;
          color:white;
      }

      th,td{
          border:1px solid #ddd;
          padding:12px;
          text-align:center;
      }

      tr:nth-child(even){
          background:#f9fafb;
      }

      .edit-btn{
          background:#f59e0b;
          color:white;
          border:none;
          padding:8px 12px;
          border-radius:6px;
          cursor:pointer;
          margin-right:5px;
      }

      .delete-btn{
          background:#ef4444;
          color:white;
          border:none;
          padding:8px 12px;
          border-radius:6px;
          cursor:pointer;
      }

      .empty{
          margin-top:20px;
          color:#666;
      }
    </style>
</head>

<body>

  <nav>
      <a href="add.html">Add</a>
      <a href="edit.html">Edit</a>
      <a href="logout.html">Logout</a>
  </nav>

  <h1>View Student Details</h1>

  <table>
      <thead>
          <tr>
              <th>Name</th>
              <th>Roll No</th>
              <th>CGPA</th>
              <th>Actions</th>
          </tr>
      </thead>

      <tbody id="tableBody"></tbody>
  </table>

  <p id="emptyMessage"></p>

    <script>

      function displayStudents() {

          const students =
              JSON.parse(localStorage.getItem("students")) || [];

          const tableBody =
              document.getElementById("tableBody");

          const emptyMessage =
              document.getElementById("emptyMessage");

          tableBody.innerHTML = "";

          if (students.length === 0) {
              emptyMessage.textContent = "No students found.";
              return;
          } else {
              emptyMessage.textContent = "";
          }

          students.forEach((student, index) => {

              tableBody.innerHTML += `
                  <tr>
                      <td>${student.name}</td>
                      <td>${student.rollno}</td>
                      <td>${student.cgpa}</td>

                      <td>
                          <button type="button"
                              class="edit-btn"
                              onclick="editStudent(${index})">
                              Edit
                          </button>

                          <button type="button"
                              class="delete-btn"
                              onclick="deleteStudent(${index})">
                              Delete
                          </button>
                      </td>
                  </tr>
              `;
          });
      }

      window.deleteStudent = function(index) {

          let students =
              JSON.parse(localStorage.getItem("students")) || [];

          if (confirm("Delete this student?")) {

              students.splice(index, 1);

              localStorage.setItem(
                  "students",
                  JSON.stringify(students)
              );

              displayStudents();
          }
      }

      window.editStudent = function(index) {

          localStorage.setItem("editIndex", index);

          window.location.href = "edit.html";
      }

      displayStudents();

    </script>

  </body>
</html>
