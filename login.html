<html>
<head>
    <title>Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: #f5f7fb;
        color: #111827;
      }

      nav {
        background: #0ea5e9;
        padding: 12px 16px;
      }

      h1 {
        margin: 18px 0;
      }

      form {
        width: 100%;
        margin: 0 auto;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }

      label {
        display: block;
        text-align: left;
        font-weight: 600;
        margin: 12px 0 8px;
        color: #111827;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        margin-top: 6px;
      }

      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: #0ea5e9;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="register.html">Register</a>
      <a href="index.html">Home</a>
    </nav>

    <h1>Login</h1>

    <form action="dashboard.html">
      <label>
        Email:
        <input type="email" name="email" placeholder="enter email" required />
      </label>

      <label>
        Password:
        <input type="password" name="password" placeholder="enter password" required />
      </label>
      <button type="submit">Login</button>      
    </form>
  </body>
</html>
