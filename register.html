<html>
<head>
    
    <title>Register</title>
    <style>

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: #f5f7fb;
        color: #111827;
      }

      nav {
        background: #0ea5e9;
        padding: 12px 16px;
      }

      h1 {
        margin: 18px 0;
      }

      form {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }

      label {
        display: block;
        text-align: left;
        font-weight: 600;
        margin: 12px 0 8px;
        color: #111827;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
        margin-top: 6px;
      }

   

      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: #0ea5e9;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

    </style>
  </head>

  <body>
    <nav>
      <a href="login.html">Login</a>
      <a href="index.html">Home</a>
    </nav>

    <h1>Register</h1>

    <form action="login.html">
      <label>
        Full Name:
        <input type="text" name="name" placeholder="enter full name" required />
      </label>

      <label>
        Email:
        <input type="email" name="email" placeholder="enter email" required />
      </label>

      <label>
        Password:
        <input type="password" name="password" placeholder="enter password" required />
      </label>

      <label>
        Confirm Password:
        <input type="password" name="confirmPassword" placeholder="re-enter password" required />
      </label>

      <button type="submit">Create Account</button>
    </form>
  </body>
</html>
