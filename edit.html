<html>
<head>
    <title>Edit Student</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: #f5f7fb;
        color: #111827;
      }

      nav {
        background: #0ea5e9;
        padding: 12px 16px;
      }

      nav a {
        text-decoration: none;
        padding: 0 10px;
        color: white;
      }

      nav a:hover {
        color: black;
      }

      h1 {
        margin: 18px 0;
      }

      form {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }

      label {
        display: block;
        text-align: left;
        font-weight: 600;
        margin: 12px 0 8px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-top: 6px;
      }

      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #0ea5e9;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
</head>

<body>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="view.html">View</a>
    <a href="logout.html">Logout</a>
</nav>

<h1>Edit Student</h1>

<form id="editForm">

    <label>
        Name:
        <input type="text" name="name" required>
    </label>

    <label>
        Roll No:
        <input type="text" name="rollno" required>
    </label>

    <label>
        CGPA:
        <input type="number" step="0.01" name="cgpa" required>
    </label>

    <button type="submit">Update</button>

</form>

<script>

const index = localStorage.getItem("editIndex");
let students = JSON.parse(localStorage.getItem("students")) || [];

// If no index found
if (index === null) {
    alert("No student selected");
    window.location.href = "view.html";
}

// Fill existing values
document.querySelector('input[name="name"]').value =
    students[index].name;

document.querySelector('input[name="rollno"]').value =
    students[index].rollno;

document.querySelector('input[name="cgpa"]').value =
    students[index].cgpa;


document.getElementById("editForm").addEventListener("submit", function(e) {
    e.preventDefault();

    students[index] = {
        name: document.querySelector('input[name="name"]').value,
        rollno: document.querySelector('input[name="rollno"]').value,
        cgpa: document.querySelector('input[name="cgpa"]').value
    };

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student updated successfully");

    window.location.href = "view.html";
});

</script>

</body>
</html>
