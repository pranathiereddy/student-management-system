<html>
  <head>
    <title>Add Students</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: #f5f7fb;
        color: #111827;
      }

      nav {
        background: #0ea5e9;
        padding: 12px 16px;
      }

      h1 {
        margin: 18px 0;
      }

      form {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }

      label {
        display: block;
        text-align: left;
        font-weight: 600;
        margin: 12px 0 8px;
        color: #111827;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
        margin-top: 6px;
      }

   

      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: #0ea5e9;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

    </style>
  </head>
  <body>
    <nav>
      <a href="viewstudent.html">View</a>
      <a href="editstudent.html">Edit</a>
      <a href="logout.html">Logout</a>
    </nav>
    <h1>Add Student Details</h1>
    <form action="login.html">
      <label>Name:<input type="text" name="name" placeholder="enter name" required></label><br>
      <label>Roll No:<input type="text" name="rollno" placeholder="enter roll no" required></label><br>
      <label>CGPA:<input type="number" name="cgpa" placeholder="enter cgpa" required></label><br>
      <button type="submit">Add</button>
    </form>
