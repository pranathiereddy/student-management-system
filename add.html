<html>
<head>
    <title>Add Students</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: #f5f7fb;
        color: #111827;
      }

      nav {
        background: #0ea5e9;
        padding: 12px 16px;
      }

      nav a{
          text-decoration: none;
          padding:0 10px;
          color:white;
      }

      nav a:hover{
          color:black;
      }

      h1 {
        margin:18px 0;
      }

      form {
        width:100%;
        max-width:420px;
        margin:0 auto;
        padding:20px;
        background:white;
        border:1px solid #e5e7eb;
        border-radius:12px;
      }

      label {
        display:block;
        text-align:left;
        font-weight:600;
        margin:12px 0 8px;
      }

      input {
        width:100%;
        padding:10px;
        border:1px solid #e5e7eb;
        border-radius:10px;
        margin-top:6px;
      }

      button {
        width:100%;
        padding:10px;
        margin-top:15px;
        border:none;
        border-radius:10px;
        background:#0ea5e9;
        color:white;
        cursor:pointer;
      }
    </style>
</head>

<body>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="view.html">View</a>
    <a href="edit.html">Edit</a>
    <a href="logout.html">Logout</a>
</nav>

<h1>Add Student Details</h1>

<form id="studentForm">

    <label>
        Name:
        <input type="text" name="name" required>
    </label>

    <label>
        Roll No:
        <input type="text" name="rollno" required>
    </label>

    <label>
        CGPA:
        <input type="number" step="0.01" name="cgpa" required>
    </label>

    <button type="submit">Add Student</button>

</form>

<script>

document.getElementById("studentForm").addEventListener("submit", function(e){

    e.preventDefault();

    const name =
        document.querySelector('[name="name"]').value;

    const rollno =
        document.querySelector('[name="rollno"]').value;

    const cgpa =
        document.querySelector('[name="cgpa"]').value;

    let students =
        JSON.parse(localStorage.getItem("students")) || [];

    students.push({
        name,
        rollno,
        cgpa
    });

    localStorage.setItem(
        "students",
        JSON.stringify(students)
    );

    alert("Student Added Successfully");

    window.location.href = "view.html";

});

</script>

</body>
</html>
